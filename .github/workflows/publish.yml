name: Publish Images

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]

jobs:
  publish:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        agent: [claude, codex, opencode, gemini, kilocode]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: deployments/
          file: deployments/Dockerfile.${{ matrix.agent }}
          push: true
          tags: ghcr.io/servusdei2018/sandbox-${{ matrix.agent }}:latest
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,mode=max,scope=${{ matrix.agent }}
